name: Sync Optimizely to Supabase

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch:
    inputs:
      project_id:
        description: "Optimizely Project ID to sync (leave blank to use the default)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          OPTIMIZELY_TOKEN: ${{ secrets.OPTIMIZELY_TOKEN }}
          OPTIMIZELY_PROJECT_ID: ${{ github.event.inputs.project_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync.py
